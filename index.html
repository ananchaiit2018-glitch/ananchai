<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตะกร้อ สกอร์บอร์ด Pro + Team Logo</title>
    <style>
        :root {
            --bg-color: #0d1b15; 
            --card-bg: #162a22;
            --gold: #ffd700;
            --team-a-color: #e63946; 
            --team-b-color: #1d3557; 
            --text-light: #f8f9fa;
        }

        body {
            font-family: 'Prompt', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid #234235;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: var(--gold);
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 13px;
            color: #8da499;
            margin-bottom: 25px;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .team-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 10px;
            border-radius: 18px;
            border-bottom: 5px solid #444;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #teamA-box { border-bottom-color: var(--team-a-color); }
        #teamB-box { border-bottom-color: var(--team-b-color); }

        /* ส่วนแสดงผลโลโก้ทีม */
        .logo-container {
            position: relative;
            width: 70px;
            height: 70px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .team-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #555;
            background-color: #222;
        }

        /* ปุ่มอัปโหลดแบบซ่อนตัวหนังสือ */
        .file-input {
            display: none;
        }

        .edit-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--gold);
            color: black;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        h2 {
            margin: 0;
            font-size: 16px;
            color: #ccc;
        }

        #teamA-box h2 { color: #ff7b82; }
        #teamB-box h2 { color: #75aadb; }

        .score {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            margin: 15px 0;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .btn-zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
        }

        .btn {
            font-family: inherit;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .btn-add {
            padding: 16px;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #teamA-box .btn-add { background: var(--team-a-color); }
        #teamB-box .btn-add { background: var(--team-b-color); }

        .btn-sub {
            background: #333;
            color: #bbb;
            padding: 8px;
            font-size: 13px;
        }

        .btn-sub:hover { background: #444; color: #fff; }

        .btn-reset {
            background: transparent;
            border: 2px solid #555;
            color: #aaa;
            padding: 12px;
            width: 100%;
            font-size: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .btn-reset:hover {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .winner-card {
            background: #222;
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--gold);
            text-align: center;
        }

        .winner-title {
            font-size: 32px;
            color: var(--gold);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SEPAK TAKRAW</h1>
        <div class="subtitle">คลิกที่รูปวงกลมเพื่อตั้งค่า/เปลี่ยนโลโก้ทีม</div>
        
        <div class="scoreboard">
            <!-- ฝั่งทีม A -->
            <div class="team-box" id="teamA-box">
                <!-- ส่วนคลิกเลือกไฟล์รูป -->
                <label class="logo-container" for="uploadA">
                    <img id="logoA" class="team-logo" src="https://cdn-icons-png.flaticon.com/512/5323/5323861.png" alt="Logo A">
                    <span class="edit-badge">เปลี่ยน</span>
                </label>
                <input type="file" id="uploadA" class="file-input" accept="image/*" onchange="previewImage(event, 'logoA')">
                
                <h2>TEAM A</h2>
                <div class="score" id="scoreA">0</div>
                <div class="btn-zone">
                    <button class="btn btn-add" onclick="addScore('A')">+ POINT</button>
                    <button class="btn btn-sub" onclick="subScore('A')">ลดคะแนน (-)</button>
                </div>
            </div>

            <!-- ฝั่งทีม B -->
            <div class="team-box" id="teamB-box">
                <!-- ส่วนคลิกเลือกไฟล์รูป -->
                <label class="logo-container" for="uploadB">
                    <img id="logoB" class="team-logo" src="https://cdn-icons-png.flaticon.com/512/5323/5323861.png" alt="Logo B">
                    <span class="edit-badge">เปลี่ยน</span>
                </label>
                <input type="file" id="uploadB" class="file-input" accept="image/*" onchange="previewImage(event, 'logoB')">

                <h2>TEAM B</h2>
                <div class="score" id="scoreB">0</div>
                <div class="btn-zone">
                    <button class="btn btn-add" onclick="addScore('B')">+ POINT</button>
                    <button class="btn btn-sub" onclick="subScore('B')">ลดคะแนน (-)</button>
                </div>
            </div>
        </div>

        <button class="btn btn-reset" onclick="resetScore()">RESET GAME (เริ่มใหม่)</button>
    </div>

    <div class="overlay" id="winnerOverlay">
        <div class="winner-card">
            <div class="winner-title" id="winnerText">🎉 TEAM A WIN!</div>
            <button class="btn btn-add" style="background: #28a745; padding: 10px 30px;" onclick="closeOverlay()">ตกลง / เริ่มเกมใหม่</button>
        </div>
    </div>

    <script>
        let scoreA = 0;
        let scoreB = 0;
        let gameOver = false;

        // ระบบเปลี่ยนไฟล์รูปภาพไอคอนทีม
        function previewImage(event, imageId) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById(imageId);
                output.src = reader.result;
            };
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        function addScore(team) {
            if (gameOver) return;
            if (team === 'A') {
                scoreA++;
                document.getElementById('scoreA').innerText = scoreA;
            } else {
                scoreB++;
                document.getElementById('scoreB').innerText = scoreB;
            }
            checkWinner();
        }

        function subScore(team) {
            if (gameOver) return;
            if (team === 'A' && scoreA > 0) {
                scoreA--;
                document.getElementById('scoreA').innerText = scoreA;
            } else if (team === 'B' && scoreB > 0) {
                scoreB--;
                document.getElementById('scoreB').innerText = scoreB;
            }
        }

        function checkWinner() {
            if (scoreA >= 21 || scoreB >= 21) {
                if (Math.abs(scoreA - scoreB) >= 2 || scoreA === 25 || scoreB === 25) {
                    gameOver = true;
                    let winnerName = scoreA > scoreB ? 'TEAM A' : 'TEAM B';
                    showWinner(winnerName);
                }
            }
        }

        function showWinner(name) {
            document.getElementById('winnerText').innerText = `🏆 ${name} ชนะในเซตนี้!`;
            document.getElementById('winnerOverlay').style.display = 'flex';
        }

        function closeOverlay() {
            document.getElementById('winnerOverlay').style.display = 'none';
            resetScore();
        }

        function resetScore() {
            scoreA = 0;
            scoreB = 0;
            gameOver = false;
            document.getElementById('scoreA').innerText = scoreA;
            document.getElementById('scoreB').innerText = scoreB;
        }
    </script>
</body>
</html>
