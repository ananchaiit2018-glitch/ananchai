<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตะกร้อ สกอร์บอร์ด Pro</title>
    <style>
        /* --- ส่วนของ CSS (ตกแต่งหน้าตา) --- */
        :root {
            --bg-color: #0d1b15; /* เขียวเข้มสไตล์สนาม */
            --card-bg: #162a22;
            --gold: #ffd700;
            --team-a-color: #e63946; /* สีแดง */
            --team-b-color: #1d3557; /* สีน้ำเงิน */
            --text-light: #f8f9fa;
        }

        body {
            font-family: 'Prompt', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid #234235;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: var(--gold);
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 13px;
            color: #8da499;
            margin-bottom: 25px;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .team-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 10px;
            border-radius: 18px;
            border-bottom: 5px solid #444;
            transition: transform 0.1s;
        }

        .team-box:active {
            transform: scale(0.98);
        }

        #teamA-box { border-bottom-color: var(--team-a-color); }
        #teamB-box { border-bottom-color: var(--team-b-color); }

        h2 {
            margin: 0;
            font-size: 18px;
            color: #ccc;
        }

        #teamA-box h2 { color: #ff7b82; }
        #teamB-box h2 { color: #75aadb; }

        .score {
            font-size: 90px;
            font-weight: 800;
            line-height: 1;
            margin: 20px 0;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* ปุ่มกดขนาดใหญ่สะใจ */
        .btn-zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            font-family: inherit;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .btn-add {
            padding: 18px;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #teamA-box .btn-add { background: var(--team-a-color); }
        #teamB-box .btn-add { background: var(--team-b-color); }

        .btn-sub {
            background: #333;
            color: #bbb;
            padding: 8px;
            font-size: 14px;
        }

        .btn-sub:hover { background: #444; color: #fff; }

        .btn-reset {
            background: transparent;
            border: 2px solid #555;
            color: #aaa;
            padding: 12px;
            width: 100%;
            font-size: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .btn-reset:hover {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        /* หน้าจอแจ้งเตือนผู้ชนะแบบสวยๆ */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .winner-card {
            background: #222;
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--gold);
            text-align: center;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .winner-title {
            font-size: 32px;
            color: var(--gold);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SEPAK TAKRAW</h1>
        <div class="subtitle">กติกาดิวส์สูงสุดไม่เกิน 25 คะแนน</div>
        
        <div class="scoreboard">
            <!-- ฝั่งทีม A -->
            <div class="team-box" id="teamA-box">
                <h2>TEAM A</h2>
                <div class="score" id="scoreA">0</div>
                <div class="btn-zone">
                    <button class="btn btn-add" onclick="addScore('A')">+ POINT</button>
                    <button class="btn btn-sub" onclick="subScore('A')">ลดคะแนน (-)</button>
                </div>
            </div>

            <!-- ฝั่งทีม B -->
            <div class="team-box" id="teamB-box">
                <h2>TEAM B</h2>
                <div class="score" id="scoreB">0</div>
                <div class="btn-zone">
                    <button class="btn btn-add" onclick="addScore('B')">+ POINT</button>
                    <button class="btn btn-sub" onclick="subScore('B')">ลดคะแนน (-)</button>
                </div>
            </div>
        </div>

        <button class="btn btn-reset" onclick="resetScore()">RESET GAME (เริ่มใหม่)</button>
    </div>

    <!-- ส่วนป๊อปอัพแจ้งผู้ชนะ -->
    <div class="overlay" id="winnerOverlay">
        <div class="winner-card">
            <div class="winner-title" id="winnerText">🎉 TEAM A WIN!</div>
            <button class="btn btn-add" style="background: #28a745; padding: 10px 30px;" onclick="closeOverlay()">ตกลง / เริ่มเกมใหม่</button>
        </div>
    </div>

    <script>
        /* --- ส่วนของ JavaScript (ระบบคำนวณ) --- */
        let scoreA = 0;
        let scoreB = 0;
        let gameOver = false;

        function addScore(team) {
            if (gameOver) return;

            if (team === 'A') {
                scoreA++;
                document.getElementById('scoreA').innerText = scoreA;
            } else {
                scoreB++;
                document.getElementById('scoreB').innerText = scoreB;
            }

            checkWinner();
        }

        function subScore(team) {
            if (gameOver) return;

            if (team === 'A' && scoreA > 0) {
                scoreA--;
                document.getElementById('scoreA').innerText = scoreA;
            } else if (team === 'B' && scoreB > 0) {
                scoreB--;
                document.getElementById('scoreB').innerText = scoreB;
            }
        }

        function checkWinner() {
            // กติกากีฬาเซปักตะกร้อ: ชนะที่ 21 คะแนน 
            // หากดิวส์ (20-20) ต้องนำห่าง 2 แต้ม แต่สูงสุดไม่เกิน 25 คะแนน
            if (scoreA >= 21 || scoreB >= 21) {
                if (Math.abs(scoreA - scoreB) >= 2 || scoreA === 25 || scoreB === 25) {
                    gameOver = true;
                    let winnerName = scoreA > scoreB ? 'TEAM A' : 'TEAM B';
                    showWinner(winnerName);
                }
            }
        }

        function showWinner(name) {
            document.getElementById('winnerText').innerText = `🏆 ${name} ชนะในเซตนี้!`;
            document.getElementById('winnerOverlay').style.display = 'flex';
        }

        function closeOverlay() {
            document.getElementById('winnerOverlay').style.display = 'none';
            resetScore();
        }

        function resetScore() {
            scoreA = 0;
            scoreB = 0;
            gameOver = false;
            document.getElementById('scoreA').innerText = scoreA;
            document.getElementById('scoreB').innerText = scoreB;
        }
    </script>
</body>
</html>
