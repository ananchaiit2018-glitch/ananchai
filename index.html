<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตะกร้อ สกอร์บอร์ด Pro - เวอร์ชันเสถียรสูงสุด</title>
    <style>
        :root {
            --bg-color: #0d1b15; 
            --card-bg: #162a22;
            --gold: #ffd700;
            --team-a-color: #e63946; 
            --team-b-color: #1d3557; 
            --text-light: #f8f9fa;
        }

        body {
            font-family: 'Prompt', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid #234235;
            text-align: center;
            position: relative;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            color: var(--gold);
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .config-zone {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 12px;
        }

        .config-label { font-size: 13px; color: #8da499; align-self: center; }
        .select-custom {
            background: #222; color: var(--gold); border: 1px solid #444;
            padding: 5px 10px; border-radius: 8px; font-family: inherit; font-weight: bold; cursor: pointer;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .team-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 10px;
            border-radius: 18px;
            border-bottom: 5px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #teamA-box { border-bottom-color: var(--team-a-color); }
        #teamB-box { border-bottom-color: var(--team-b-color); }

        .settings-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.1); border: none; color: #ccc;
            border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px;
            display: flex; justify-content: center; align-items: center;
        }
        .settings-badge:hover { background: var(--gold); color: black; }

        .icon-display {
            font-size: 45px; width: 70px; height: 70px; display: flex;
            justify-content: center; align-items: center; background: #222;
            border-radius: 50%; border: 2px solid #444; margin-bottom: 5px; user-select: none;
        }

        .sets-won { display: flex; gap: 6px; margin-bottom: 10px; }
        .set-dot { width: 12px; height: 12px; border-radius: 50%; background: #444; border: 1px solid #222; }
        .set-dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

        h2 { margin: 0; font-size: 16px; color: #ccc; }
        .score { font-size: 80px; font-weight: 800; line-height: 1; margin: 10px 0; font-family: monospace; }

        .btn-zone { display: flex; flex-direction: column; gap: 8px; width: 90%; }
        .btn { font-family: inherit; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; user-select: none; }
        .btn-add { padding: 16px; font-size: 18px; color: white; }
        #teamA-box .btn-add { background: var(--team-a-color); }
        #teamB-box .btn-add { background: var(--team-b-color); }
        .btn-sub { background: #333; color: #bbb; padding: 6px; font-size: 12px; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-action { padding: 12px; font-size: 14px; border-radius: 12px; background: transparent; border: 1px solid #555; color: #ccc; }
        .btn-action:hover { background: #222; color: #fff; }
        #btn-reset-match:hover { background: #dc3545; border-color: #dc3545; color: white; }

        /* โซนประวัติการแข่งขันย้อนหลัง */
        .history-container {
            width: 100%;
            max-width: 500px;
            background: #112019;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #1f3a2d;
            box-sizing: border-box;
            text-align: left;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #234235;
            padding-bottom: 8px;
        }

        .history-title { font-size: 16px; color: var(--gold); font-weight: bold; margin: 0; }
        .btn-clear-history {
            background: rgba(220, 53, 69, 0.1); border: 1px solid #dc3545; color: #ff7b82;
            padding: 4px 10px; font-size: 11px; border-radius: 6px; cursor: pointer; font-family: inherit;
        }
        .btn-clear-history:hover { background: #dc3545; color: white; }

        .history-list {
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #666;
        }
        .history-item.win-left { border-left-color: var(--team-a-color); }
        .history-item.win-right { border-left-color: var(--team-b-color); }

        .tag-set {
            background: var(--gold); color: #000; padding: 2px 6px; 
            border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px;
        }

        .no-history { color: #668073; font-size: 13px; text-align: center; padding: 15px 0; width: 100%; }

        /* หน้าต่างป๊อปอัป */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 10; }
        .modal-card { background: #1a3026; padding: 25px; border-radius: 20px; border: 2px solid var(--gold); text-align: center; width: 85%; max-width: 360px; }
        .modal-title { font-size: 20px; color: var(--gold); margin-bottom: 15px; font-weight: bold; }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; }
        .emoji-item { font-size: 28px; cursor: pointer; padding: 5px; transition: 0.1s; }
        .emoji-item:hover { transform: scale(1.15); }
        .btn-close { background: #444; color: white; padding: 10px; width: 100%; }
        .winner-title { font-size: 24px; color: var(--gold); margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SEPAK TAKRAW</h1>
        
        <div class="config-zone">
            <span class="config-label">คะแนนชนะในเซตปกติ:</span>
            <select id="maxScoreSelect" class="select-custom" onchange="updateMaxScoreConfig()">
                <option value="21">21 คะแนน</option>
                <option value="15">15 คะแนน</option>
            </select>
        </div>
        
        <div class="scoreboard">
            <!-- ฝั่งซ้าย -->
            <div class="team-box" id="teamA-box">
                <button class="settings-badge" onclick="openSettings('A')">⚙️</button>
                <div id="displayA" class="icon-display">🔴</div>
                <h2 id="nameA">TEAM A</h2>
                <div class="sets-won">
                    <div id="setA-1" class="set-dot"></div>
                    <div id="setA-2" class="set-dot"></div>
                </div>
                <div class="score" id="scoreA">0</div>
                <div class="btn-zone">
                    <button class="btn btn-add" onclick="addScore('A')">+ POINT</button>
                    <button class="btn btn-sub" onclick="subScore('A')">ลดคะแนน (-)</button>
                </div>
            </div>

            <!-- ฝั่งขวา -->
            <div class="team-box" id="teamB-box">
                <button class="settings-badge" onclick="openSettings('B')">⚙️</button>
                <div id="displayB" class="icon-display">🔵</div>
                <h2 id="nameB">TEAM B</h2>
                <div class="sets-won">
                    <div id="setB-1" class="set-dot"></div>
                    <div id="setB-2" class="set-dot"></div>
                </div>
                <div class="score" id="scoreB">0</div>
                <div class="btn-zone">
                    <button class="btn btn-add" onclick="addScore('B')">+ POINT</button>
                    <button class="btn btn-sub" onclick="subScore('B')">ลดคะแนน (-)</button>
                </div>
            </div>
        </div>

        <div class="action-grid">
            <button class="btn btn-action" onclick="switchSides()">🔄 สลับฝั่งสนาม</button>
            <button class="btn btn-action" id="btn-reset-match" onclick="resetFullMatch()">เริ่มแมตช์ใหม่</button>
        </div>
    </div>

    <!-- โซนประวัติการแข่งขันย้อนหลัง -->
    <div class="history-container">
        <div class="history-header">
            <h3 class="history-title">📜 ประวัติการบันทึกคะแนน (รายเซ็ต)</h3>
            <button class="btn-clear-history" onclick="clearMatchHistory()">ล้างประวัติทั้งหมด</button>
        </div>
        <div id="historyList" class="history-list">
            <div class="no-history">ยังไม่มีประวัติการแข่งขันในเครื่องนี้</div>
        </div>
    </div>

    <!-- หน้าต่างตั้งค่าไอคอน -->
    <div class="overlay" id="settingsOverlay">
        <div class="modal-card">
            <div class="modal-title" id="settingsTitle">ตั้งค่าไอคอนทีม</div>
            <div class="emoji-grid">
                <div class="emoji-item" onclick="selectEmoji('🇹🇭')">🇹🇭</div>
                <div class="emoji-item" onclick="selectEmoji('🇲🇾')">🇲🇾</div>
                <div class="emoji-item" onclick="selectEmoji('🇰🇷')">🇰🇷</div>
                <div class="emoji-item" onclick="selectEmoji('🇻🇳')">🇻🇳</div>
                <div class="emoji-item" onclick="selectEmoji('🇯🇵')">🇯🇵</div>
                <div class="emoji-item" onclick="selectEmoji('🔥')">🔥</div>
                <div class="emoji-item" onclick="selectEmoji('⚡')">⚡</div>
                <div class="emoji-item" onclick="selectEmoji('🏆')">🏆</div>
                <div class="emoji-item" onclick="selectEmoji('🐯')">🐯</div>
                <div class="emoji-item" onclick="selectEmoji('🐉')">🐉</div>
            </div>
            <button class="btn btn-close" onclick="closeSettings()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <!-- ป๊อปอัพแจ้งผู้ชนะ -->
    <div class="overlay" id="winnerOverlay">
        <div class="modal-card" style="border-color: var(--gold); background: #222; max-width: 400px;">
            <div class="winner-title" id="winnerText">🎉 TEAM A WIN!</div>
            <button class="btn btn-add" id="winnerBtn" style="background: #28a745; padding: 12px 30px; width: 100%;" onclick="handleWinnerClose()">ตกลง</button>
        </div>
    </div>

    <script>
        let scoreA = 0, scoreB = 0;
        let setsWonA = 0, setsWonB = 0;
        let currentSetNumber = 1;
        let targetScore = 21;
        let gameOver = false, matchOver = false;
        let currentEditingTeam = '';
        
        // ใช้ Array ในการจำประวัติในรอบการเปิดแอปนั้นๆ เป็นหลัก เพื่อไม่ให้ง้อระบบเครื่อง
        let memoryHistory = [];

        window.onload = function() {
            // ดึงข้อมูลเก่าจากเครื่องมาใส่ใน Memory (ถ้ามีสิทธิ์เข้าถึง)
            try {
                let saved = localStorage.getItem('takraw_history_v3');
                if (saved) {
                    memoryHistory = JSON.parse(saved);
                }
            } catch (e) {
                console.log("LocalStorage บล็อกการเข้าถึง");
            }
            renderHistory();
        };

        function updateMaxScoreConfig() {
            targetScore = parseInt(document.getElementById('maxScoreSelect').value);
            resetCurrentSet();
        }

        function openSettings(side) {
            currentEditingTeam = side;
            document.getElementById('settingsTitle').innerText = `เลือกไอคอนสำหรับฝั่ง ${side === 'A' ? 'ซ้าย' : 'ขวา'}`;
            document.getElementById('settingsOverlay').style.display = 'flex';
        }

        function closeSettings() { document.getElementById('settingsOverlay').style.display = 'none'; }

        function selectEmoji(emoji) {
            if (currentEditingTeam === 'A') {
                document.getElementById('displayA').innerText = emoji;
            } else {
                document.getElementById('displayB').innerText = emoji;
            }
            closeSettings();
        }

        function addScore(side) {
            if (gameOver || matchOver) return;
            if (side === 'A') {
                scoreA++;
                document.getElementById('scoreA').innerText = scoreA;
            } else {
                scoreB++;
                document.getElementById('scoreB').innerText = scoreB;
            }
            checkSetWinner();
        }

        function subScore(side) {
            if (gameOver || matchOver) return;
            if (side === 'A' && scoreA > 0) {
                scoreA--;
                document.getElementById('scoreA').innerText = scoreA;
            } else if (side === 'B' && scoreB > 0) {
                scoreB--;
                document.getElementById('scoreB').innerText = scoreB;
            }
        }

        function checkSetWinner() {
            let maxDeuceScore = targetScore === 21 ? 25 : 19;
            if (scoreA >= targetScore || scoreB >= targetScore) {
                if (Math.abs(scoreA - scoreB) >= 2 || scoreA === maxDeuceScore || scoreB === maxDeuceScore) {
                    gameOver = true;
                    
                    if (scoreA > scoreB) {
                        setsWonA++;
                        updateSetDots('A', setsWonA);
                    } else {
                        setsWonB++;
                        updateSetDots('B', setsWonB);
                    }

                    // บันทึกทันที
                    saveSetResult();

                    checkMatchWinner();
                }
            }
        }

        function updateSetDots(side, sets) {
            if (side === 'A') {
                if (sets >= 1) document.getElementById('setA-1').classList.add('active');
                if (sets >= 2) document.getElementById('setA-2').classList.add('active');
            } else {
                if (sets >= 1) document.getElementById('setB-1').classList.add('active');
                if (sets >= 2) document.getElementById('setB-2').classList.add('active');
            }
        }

        function checkMatchWinner() {
            let iconA = document.getElementById('displayA').innerText || "🔴";
            let iconB = document.getElementById('displayB').innerText || "🔵";
            let nameA = document.getElementById('nameA').innerText || "TEAM A";
            let nameB = document.getElementById('nameB').innerText || "TEAM B";

            if (setsWonA === 2) {
                matchOver = true;
                document.getElementById('winnerText').innerText = `🏆 จบการแข่งขัน! ${iconA} ${nameA} ชนะแมตช์นี้รวม ${setsWonA}-${setsWonB} เซต`;
                document.getElementById('winnerBtn').innerText = `เคลียร์กระดานเพื่อเริ่มแมตช์ใหม่`;
            } else if (setsWonB === 2) {
                matchOver = true;
                document.getElementById('winnerText').innerText = `🏆 จบการแข่งขัน! ${iconB} ${nameB} ชนะแมตช์นี้รวม ${setsWonB}-${setsWonA} เซต`;
                document.getElementById('winnerBtn').innerText = `เคลียร์กระดานเพื่อเริ่มแมตช์ใหม่`;
            } else {
                let currentWinner = scoreA > scoreB ? `${iconA} ${nameA}` : `${iconB} ${nameB}`;
                document.getElementById('winnerText').innerText = `🎉 จบเซตที่ ${currentSetNumber}! ${currentWinner} ชนะเซตนี้ด้วยคะแนน ${scoreA}-${scoreB}`;
                document.getElementById('winnerBtn').innerText = `ไปต่อเซตถัดไป`;
            }
            document.getElementById('winnerOverlay').style.display = 'flex';
        }

        function handleWinnerClose() {
            document.getElementById('winnerOverlay').style.display = 'none';
            if (matchOver) {
                resetFullMatch();
            } else {
                currentSetNumber++;
                resetCurrentSet();
            }
        }

        function saveSetResult() {
            let iconA = document.getElementById('displayA').innerText || "🔴";
            let iconB = document.getElementById('displayB').innerText || "🔵";
            let nameA = document.getElementById('nameA').innerText || "TEAM A";
            let nameB = document.getElementById('nameB').innerText || "TEAM B";

            let winnerSide = scoreA > scoreB ? 'left' : 'right';
            
            let setData = {
                setNo: currentSetNumber,
                teamA: `${iconA} ${nameA}`,
                teamB: `${iconB} ${nameB}`,
                scoreA: scoreA,
                scoreB: scoreB,
                sideClass: winnerSide === 'left' ? 'win-left' : 'win-right',
                time: new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'})
            };

            // ใส่เข้าไปในตัวแปรหลักบนแรมเครื่องทันทีเพื่อให้ทำงานได้แน่นอน 100%
            memoryHistory.unshift(setData);

            // พยายามพ่วงบันทึกลงตัวเครื่องเก็บไว้ด้วยถ้าไม่มีอะไรบล็อก
            try {
                localStorage.setItem('takraw_history_v3', JSON.stringify(memoryHistory));
            } catch (e) {
                console.log("เขียนลงเครื่องล้มเหลว แต่เก็บในแรมเรียบร้อย");
            }
            
            renderHistory();
        }

        function renderHistory() {
            let historyList = document.getElementById('historyList');
            
            if (memoryHistory.length === 0) {
                historyList.innerHTML = '<div class="no-history">ยังไม่มีประวัติการแข่งขันในเครื่องนี้</div>';
                return;
            }

            let html = '';
            memoryHistory.forEach(item => {
                html += `
                    <div class="history-item ${item.sideClass}">
                        <div>
                            <strong>${item.teamA}</strong> vs <strong>${item.teamB}</strong> <span class="tag-set">เซตที่ ${item.setNo}</span>
                            <div style="font-size: 10px; color: #668073; margin-top: 2px;">เวลาบันทึก ${item.time} น.</div>
                        </div>
                        <div style="font-size: 18px; font-weight: bold; color: var(--gold); font-family: monospace;">
                            ${item.scoreA} - ${item.scoreB}
                        </div>
                    </div>
                `;
            });
            historyList.innerHTML = html;
        }

        function clearMatchHistory() {
            if(confirm("คุณต้องการล้างประวัติคะแนนเซตทั้งหมดใช่หรือไม่?")) {
                memoryHistory = [];
                try {
                    localStorage.removeItem('takraw_history_v3');
                } catch(e) {}
                renderHistory();
            }
        }

        function resetCurrentSet() {
            scoreA = 0; scoreB = 0; gameOver = false;
            document.getElementById('scoreA').innerText = scoreA;
            document.getElementById('scoreB').innerText = scoreB;
        }

        function resetFullMatch() {
            setsWonA = 0; setsWonB = 0; matchOver = false; currentSetNumber = 1;
            document.getElementById('setA-1').classList.remove('active');
            document.getElementById('setA-2').classList.remove('active');
            document.getElementById('setB-1').classList.remove('active');
            document.getElementById('setB-2').classList.remove('active');
            resetCurrentSet();
        }

        function switchSides() {
            let tempScore = scoreA; scoreA = scoreB; scoreB = tempScore;
            document.getElementById('scoreA').innerText = scoreA;
            document.getElementById('scoreB').innerText = scoreB;

            let tempSets = setsWonA; setsWonA = setsWonB; setsWonB = tempSets;
            document.getElementById('setA-1').classList.remove('active');
            document.getElementById('setA-2').classList.remove('active');
            document.getElementById('setB-1').classList.remove('active');
            document.getElementById('setB-2').classList.remove('active');
            updateSetDots('A', setsWonA);
            updateSetDots('B', setsWonB);

            let displayA = document.getElementById('displayA');
            let displayB = document.getElementById('displayB');
            let nameA = document.getElementById('nameA');
            let nameB = document.getElementById('nameB');

            let tempIcon = displayA.innerText; displayA.innerText = displayB.innerText; displayB.innerText = tempIcon;
            let tempName = nameA.innerText; nameA.innerText = nameB.innerText; nameB.innerText = tempName;
        }
    </script>
</body>
</html>
