<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตะกร้อ สกอร์บอร์ด Pro + Quick Emoji & Flags</title>
    <style>
        :root {
            --bg-color: #0d1b15; 
            --card-bg: #162a22;
            --gold: #ffd700;
            --team-a-color: #e63946; 
            --team-b-color: #1d3557; 
            --text-light: #f8f9fa;
        }

        body {
            font-family: 'Prompt', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid #234235;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 24px;
            color: var(--gold);
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 13px;
            color: #8da499;
            margin-bottom: 25px;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .team-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 10px;
            border-radius: 18px;
            border-bottom: 5px solid #444;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #teamA-box { border-bottom-color: var(--team-a-color); }
        #teamB-box { border-bottom-color: var(--team-b-color); }

        /* ปุ่มตั้งค่าทีม */
        .settings-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #ccc;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .settings-badge:hover {
            background: var(--gold);
            color: black;
        }

        /* ส่วนแสดงผลไอคอน/ธง */
        .icon-display {
            font-size: 50px;
            width: 75px;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #222;
            border-radius: 50%;
            border: 2px solid #444;
            margin-bottom: 10px;
            user-select: none;
        }

        h2 {
            margin: 0;
            font-size: 16px;
            color: #ccc;
        }

        #teamA-box h2 { color: #ff7b82; }
        #teamB-box h2 { color: #75aadb; }

        .score {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            margin: 15px 0;
            font-family: monospace;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .btn-zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
        }

        .btn {
            font-family: inherit;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .btn-add {
            padding: 16px;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #teamA-box .btn-add { background: var(--team-a-color); }
        #teamB-box .btn-add { background: var(--team-b-color); }

        .btn-sub {
            background: #333;
            color: #bbb;
            padding: 8px;
            font-size: 13px;
        }

        .btn-reset {
            background: transparent;
            border: 2px solid #555;
            color: #aaa;
            padding: 12px;
            width: 100%;
            font-size: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .btn-reset:hover {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        /* กล่องหน้าต่างป๊อปอัพ (Overlay ทั่วไป) */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-card {
            background: #1a3026;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            text-align: center;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-size: 20px;
            color: var(--gold);
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* ตารางตัวเลือกอิโมจิและธงชาติ */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
        }

        .emoji-item {
            font-size: 28px;
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
            transition: 0.1s;
            user-select: none;
        }

        .emoji-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.15);
        }

        .btn-close {
            background: #444;
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SEPAK TAKRAW</h1>
        <div class="subtitle">กดปุ่ม ⚙️ เพื่อเลือกธงชาติหรืออิโมจิประจำทีม</div>
        
        <div class="scoreboard">
            <!-- ฝั่งทีม A -->
            <div class="team-box" id="teamA-box">
                <button class="settings-badge" onclick="openSettings('A')">⚙️</button>
                <div id="displayA" class="icon-display">🔴</div>
                <h2>TEAM A</h2>
                <div class="score" id="scoreA">0</div>
                <div class="btn-zone">
                    <button class="btn btn-add" onclick="addScore('A')">+ POINT</button>
                    <button class="btn btn-sub" onclick="subScore('A')">ลดคะแนน (-)</button>
                </div>
            </div>

            <!-- ฝั่งทีม B -->
            <div class="team-box" id="teamB-box">
                <button class="settings-badge" onclick="openSettings('B')">⚙️</button>
                <div id="displayB" class="icon-display">🔵</div>
                <h2>TEAM B</h2>
                <div class="score" id="scoreB">0</div>
                <div class="btn-zone">
                    <button class="btn btn-add" onclick="addScore('B')">+ POINT</button>
                    <button class="btn btn-sub" onclick="subScore('B')">ลดคะแนน (-)</button>
                </div>
            </div>
        </div>

        <button class="btn btn-reset" onclick="resetScore()">RESET GAME (เริ่มใหม่)</button>
    </div>

    <!-- หน้าต่างป๊อปอัปเลือกไอคอน/ธงชาติ -->
    <div class="overlay" id="settingsOverlay">
        <div class="modal-card">
            <div class="modal-title" id="settingsTitle">ตั้งค่าไอคอนทีม</div>
            
            <div style="text-align: left; font-size: 13px; color: #8da499; margin-bottom: 5px;">ธงชาติ:</div>
            <div class="emoji-grid">
                <div class="emoji-item" onclick="selectEmoji('🇹🇭')">🇹🇭</div>
                <div class="emoji-item" onclick="selectEmoji('🇲🇾')">🇲🇾</div>
                <div class="emoji-item" onclick="selectEmoji('🇰🇷')">🇰🇷</div>
                <div class="emoji-item" onclick="selectEmoji('🇻🇳')">🇻🇳</div>
                <div class="emoji-item" onclick="selectEmoji('🇯🇵')">🇯🇵</div>
                <div class="emoji-item" onclick="selectEmoji('🇮🇩')">🇮🇩</div>
                <div class="emoji-item" onclick="selectEmoji('🇸🇬')">🇸🇬</div>
                <div class="emoji-item" onclick="selectEmoji('🇵🇭')">🇵🇭</div>
                <div class="emoji-item" onclick="selectEmoji('🇲🇲')">🇲🇲</div>
                <div class="emoji-item" onclick="selectEmoji('🇱🇦')">🇱🇦</div>
            </div>

            <div style="text-align: left; font-size: 13px; color: #8da499; margin-bottom: 5px;">อิโมจินำโชค:</div>
            <div class="emoji-grid">
                <div class="emoji-item" onclick="selectEmoji('🔥')">🔥</div>
                <div class="emoji-item" onclick="selectEmoji('⚡')">⚡</div>
                <div class="emoji-item" onclick="selectEmoji('🏆')">🏆</div>
                <div class="emoji-item" onclick="selectEmoji('🐯')">🐯</div>
                <div class="emoji-item" onclick="selectEmoji('🐉')">🐉</div>
                <div class="emoji-item" onclick="selectEmoji('🦅')">🦅</div>
                <div class="emoji-item" onclick="selectEmoji('🦁')">🦁</div>
                <div class="emoji-item" onclick="selectEmoji('🦈')">🦈</div>
                <div class="emoji-item" onclick="selectEmoji('🔴')">🔴</div>
                <div class="emoji-item" onclick="selectEmoji('🔵')">🔵</div>
            </div>

            <button class="btn btn-close" onclick="closeSettings()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <!-- ป๊อปอัพแจ้งผู้ชนะ -->
    <div class="overlay" id="winnerOverlay">
        <div class="modal-card" style="border-color: var(--gold); background: #222;">
            <div class="winner-title" id="winnerText">🎉 TEAM A WIN!</div>
            <button class="btn btn-add" style="background: #28a745; padding: 10px 30px; width: auto;" onclick="closeOverlay()">ตกลง / เริ่มเกมใหม่</button>
        </div>
    </div>

    <script>
        let scoreA = 0;
        let scoreB = 0;
        let gameOver = false;
        let currentEditingTeam = ''; // เก็บสถานะว่ากำลังเปลี่ยนรูปให้ทีมไหนอยู่

        // เปิดป๊อปอัปเลือกไอคอน
        function openSettings(team) {
            currentEditingTeam = team;
            document.getElementById('settingsTitle').innerText = `เลือกไอคอนสำหรับ TEAM ${team}`;
            document.getElementById('settingsOverlay').style.display = 'flex';
        }

        // ปิดป๊อปอัปเลือกไอคอน
        function closeSettings() {
            document.getElementById('settingsOverlay').style.display = 'none';
        }

        // เมื่อเลือกธงหรืออิโมจิ
        function selectEmoji(emoji) {
            if (currentEditingTeam === 'A') {
                document.getElementById('displayA').innerText = emoji;
            } else if (currentEditingTeam === 'B') {
                document.getElementById('displayB').innerText = emoji;
            }
            closeSettings();
        }

        function addScore(team) {
            if (gameOver) return;
            if (team === 'A') {
                scoreA++;
                document.getElementById('scoreA').innerText = scoreA;
            } else {
                scoreB++;
                document.getElementById('scoreB').innerText = scoreB;
            }
            checkWinner();
        }

        function subScore(team) {
            if (gameOver) return;
            if (team === 'A' && scoreA > 0) {
                scoreA--;
                document.getElementById('scoreA').innerText = scoreA;
            } else if (team === 'B' && scoreB > 0) {
                scoreB--;
                document.getElementById('scoreB').innerText = scoreB;
            }
        }

        function checkWinner() {
            if (scoreA >= 21 || scoreB >= 21) {
                if (Math.abs(scoreA - scoreB) >= 2 || scoreA === 25 || scoreB === 25) {
                    gameOver = true;
                    let winnerIcon = scoreA > scoreB ? document.getElementById('displayA').innerText : document.getElementById('displayB').innerText;
                    let winnerName = scoreA > scoreB ? 'TEAM A' : 'TEAM B';
                    showWinner(winnerName, winnerIcon);
                }
            }
        }

        function showWinner(name, icon) {
            document.getElementById('winnerText').innerText = `🏆 ${icon} ${name} ชนะในเซตนี้!`;
            document.getElementById('winnerOverlay').style.display = 'flex';
        }

        function closeOverlay() {
            document.getElementById('winnerOverlay').style.display = 'none';
            resetScore();
        }

        function resetScore() {
            scoreA = 0;
            scoreB = 0;
            gameOver = false;
            document.getElementById('scoreA').innerText = scoreA;
            document.getElementById('scoreB').innerText = scoreB;
        }
    </script>
</body>
</html>
